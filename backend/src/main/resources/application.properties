
server.port=8080

# --- PostgreSQL Datasource ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/food_delivery_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:your_super_secret_jwt_key_here}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- Stripe Properties ---
stripe.secret-key=${STRIPE_SECRET_KEY:your_stripe_secret_key_here}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:your_stripe_publishable_key_here}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:your_stripe_webhook_secret_here}


